<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi người anh yêu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffebee;
            font-family: 'Courier New', Courier, monospace; /* Font kiểu code */
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        /* Dòng code Input/Output */
        .code-header {
            color: #d81b60;
            font-size: 1.2rem;
            margin-bottom: 30px;
            border-right: 2px solid #ff4d6d;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            margin-left: auto;
            margin-right: auto;
            animation: typing 3s steps(30) forwards, blink 0.5s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #ff4d6d }
        }

        /* Hiệu ứng trái tim đập */
        .heart {
            position: relative;
            width: 120px;
            height: 120px;
            background-color: #ff4d6d;
            margin: 20px auto;
            transform: rotate(-45deg);
            animation: beat 0.8s infinite alternate;
            box-shadow: 0 0 40px #ff4d6d;
        }

        .heart:before, .heart:after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: #ff4d6d;
            border-radius: 50%;
        }

        .heart:before { top: -60px; left: 0; }
        .heart:after { left: 60px; top: 0; }

        @keyframes beat {
            0% { transform: rotate(-45deg) scale(1); }
            100% { transform: rotate(-45deg) scale(1.2); }
        }

        /* Lời chúc */
        .wish-text {
            margin-top: 60px;
            color: #c9184a;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: bold;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 3.5s; /* Hiện sau khi dòng code chạy xong */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #ffb3c1;
            border-radius: 50%;
            animation: fly 3s infinite linear;
            z-index: 1;
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart"></div>
        <div class="wish-text">
            ️8/3❤️  <br>
            Chúc cô gái anh yêu luôn xinh đẹp, hạnh phúc <br>
            Chúc em tất cả <br>
			Cám ơn em đã đến bên anh <br>
            Mãi yêu em! ❤️
        </div>
    </div>

    <script>
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = '100vh';
            sparkle.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 3000);
        }
        setInterval(createSparkle, 150);
    </script>
</body>
</html>
