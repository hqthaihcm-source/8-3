<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người anh yêu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffebee;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Màn hình chờ */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffebee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .gift-btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: transform 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }

        .gift-btn:hover { transform: scale(1.1); background-color: #ff758f; }

        /* Container chính */
        .container { text-align: center; display: none; }

        .code-header {
            color: #d81b60;
            font-size: 1.2rem;
            margin-bottom: 30px;
            border-right: 2px solid #ff4d6d;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            margin-left: auto;
            margin-right: auto;
        }

        .animate-typing { animation: typing 2.5s steps(30) forwards, blink 0.5s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #ff4d6d } }

        .heart {
            position: relative;
            width: 120px;
            height: 120px;
            background-color: #ff4d6d;
            margin: 20px auto;
            transform: rotate(-45deg);
            animation: beat 0.8s infinite alternate;
            box-shadow: 0 0 40px #ff4d6d;
        }
        .heart:before, .heart:after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: #ff4d6d;
            border-radius: 50%;
        }
        .heart:before { top: -60px; left: 0; }
        .heart:after { left: 60px; top: 0; }
        @keyframes beat { 0% { transform: rotate(-45deg) scale(1); } 100% { transform: rotate(-45deg) scale(1.2); } }

        .wish-text {
            margin-top: 60px;
            color: #c9184a;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: bold;
            opacity: 0;
        }
        .animate-fade { animation: fadeIn 2s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #ffb3c1;
            border-radius: 50%;
            animation: fly 3s infinite linear;
        }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/And-So-It-Begins-Inspired-By-Crush-Music.mp3" type="audio/mpeg">
        </audio>

    <div id="welcome-screen">
        <button class="gift-btn" onclick="startSurprise()">Mở món quà 8/3 từ Anh ❤️</button>
        <p style="margin-top: 15px; color: #ff4d6d; font-size: 0.9rem;">(Bật âm thanh để trải nghiệm tốt nhất)</p>
    </div>
	<div class="container" id="main-content">
        <div class="heart"></div>
        <div class="wish-text" id="wish">
			Input: Anh - Output: Yêu Em ❤️ <br>
            ❤️8/3❤️  <br>
            Chúc cô gái anh yêu luôn xinh đẹp, hạnh phúc <br>
            Chúc em tất cả <br>
			Cám ơn em đã đến bên anh <br>
            Mãi yêu em! ❤️
        </div>
    </div>

    <script>
        function startSurprise() {
            // Phát nhạc
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio play failed"));

            // Chuyển màn hình
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('typing-text').classList.add('animate-typing');
                setTimeout(() => {
                    document.getElementById('wish').classList.add('animate-fade');
                }, 3000);
            }, 1000);

            setInterval(createSparkle, 150);
        }

        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = '100vh';
            sparkle.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 3000);
        }
    </script>
</body>
</html>
