<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người anh yêu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffebee;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffebee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .gift-btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(255, 77, 109, 0.4);
            transition: all 0.3s;
            font-weight: bold;
        }

        .gift-btn:hover {
            transform: scale(1.1);
            background-color: #ff758f;
        }

        .container { text-align: center; display: none; position: relative; z-index: 10; }

        .heart {
            position: relative;
            width: 120px;
            height: 120px;
            background-color: #ff4d6d;
            margin: 20px auto;
            transform: rotate(-45deg);
            animation: beat 0.8s infinite alternate;
            box-shadow: 0 0 40px #ff4d6d;
        }
        .heart:before, .heart:after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: #ff4d6d;
            border-radius: 50%;
        }
        .heart:before { top: -60px; left: 0; }
        .heart:after { left: 60px; top: 0; }
        @keyframes beat { 0% { transform: rotate(-45deg) scale(1); } 100% { transform: rotate(-45deg) scale(1.2); } }

        .wish-text {
            margin-top: 60px;
            color: #c9184a;
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: bold;
            opacity: 0;
        }
        .animate-fade { animation: fadeIn 2s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <audio id="bg-music" loop>
        <source src="Sunshine-Boulevard-chosic.com_.mp3" type="audio/mpeg">
    </audio>

    <div id="welcome-screen">
        <button class="gift-btn" onclick="startSurprise()">Mở quà từ Anh ❤️</button>
        <p style="margin-top: 20px; color: #ff4d6d; font-size: 0.9rem;">(Bật âm thanh để trải nghiệm tốt hơn)</p>
    </div>

    <div class="container" id="main-content">
        <div class="heart"></div>
        <div class="wish-text" id="wish">
            Input: Anh - Output: Yêu Em <br>
			❤️8/3❤️  <br>
            Chúc cô gái anh yêu luôn xinh đẹp, hạnh phúc <br>
            Chúc em tất cả <br>
			Cám ơn em đã đến bên anh <br>
            Mãi yêu em! ❤️
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, angle, speed) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 2;
                this.angle = angle;
                this.speed = speed;
                this.friction = 0.95;
                this.gravity = 0.1;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createHeartFirework(x, y) {
            const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#c9184a'];
            for (let i = 0; i < 100; i++) {
                const t = Math.random() * Math.PI * 2;
                const tx = 16 * Math.pow(Math.sin(t), 3);
                const ty = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                const speed = Math.random() * 3 + 2;
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)], Math.atan2(ty, tx), speed));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function startSurprise() {
            const music = document.getElementById('bg-music');
            music.play();

            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    createHeartFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.5);
                }, i * 500);
            }

            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                // Hiện lời chúc ngay sau khi pháo hoa bắt đầu
                document.getElementById('wish').classList.add('animate-fade');
            }, 1000);
        }
    </script>
</body>
</html>
