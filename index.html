<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi người anh yêu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffebee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* Hiệu ứng trái tim đập */
        .heart {
            position: relative;
            width: 150px;
            height: 150px;
            background-color: #ff4d6d;
            margin: 0 auto;
            transform: rotate(-45deg);
            animation: beat 0.8s infinite alternate;
            box-shadow: 0 0 40px #ff4d6d;
        }

        .heart:before, .heart:after {
            content: "";
            position: absolute;
            width: 150px;
            height: 150px;
            background-color: #ff4d6d;
            border-radius: 50%;
        }

        .heart:before { top: -75px; left: 0; }
        .heart:after { left: 75px; top: 0; }

        @keyframes beat {
            0% { transform: rotate(-45deg) scale(1); }
            100% { transform: rotate(-45deg) scale(1.2); }
        }

        /* Phần chữ lời chúc */
        .wish-text {
            margin-top: 100px;
            color: #c9184a;
            font-size: 1.5rem;
            line-height: 1.6;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hiệu ứng pháo hoa li ti xung quanh */
        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #ffb3c1;
            border-radius: 50%;
            animation: fly 3s infinite linear;
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart"></div>
        <div class="wish-text"> 8-3 <br>
            Chúc cô gái anh yêu <br>
            Luôn xinh đẹp và hạnh phúc <br>
            Đạt được những ước mơ của mình <br>
            Mãi yêu em! <br>
        </div>
    </div>

    <script>
        // Tạo hiệu ứng hạt bay lãng mạn
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 3000);
        }
        setInterval(createSparkle, 200);
    </script>
</body>
</html>
